<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联系与投稿 - AI 工具导航</title>
    <meta name="description" content="联系 AI 工具导航，提交 AI 工具收录建议或内容修正建议。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="plain-page">
      <header>
        <p class="eyebrow">Contact</p>
        <h1>联系与投稿</h1>
      </header>

      <section>
        <h2>工具收录建议</h2>
        <p>
          如果你希望推荐新的 AI 工具，请提供工具名称、官网链接、主要用途、适合人群、是否支持中文以及你认为值得收录的理由。本站会优先考虑有明确使用场景、产品信息透明、仍在持续维护的工具。
        </p>
      </section>

      <section>
        <h2>内容修正</h2>
        <p>
          AI 产品变化很快，如果页面中的工具介绍、链接、分类或使用建议不准确，可以提交修正建议。我们会根据公开信息和实际体验进行调整。
        </p>
      </section>

      <section>
        <h2>联系方式</h2>
        <p>
          你可以把联系邮箱替换成自己的邮箱，例如：contact@example.com。部署前建议改成真实可用的邮箱，方便用户和审核方确认网站维护者信息。
        </p>
      </section>

      <footer class="site-footer">
        <a href="./index.html">返回首页</a>
        <a href="./about.html">关于本站</a>
        <a href="./privacy.html">隐私政策</a>
      </footer>
    </main>
  </body>
</html>
